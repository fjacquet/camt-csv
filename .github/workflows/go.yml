# This workflow will build and test a golang project with enhanced CI features
# Includes caching, linting, test coverage, race detection, and security scanning

name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m
  
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test with Race Detector and Coverage
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: fjacquet/camt-csv
  
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      
      - name: Run gosec
        run: gosec -exclude=G304 -fmt=sarif -out=security.sarif ./... || true

      - name: Fix SARIF relationships
        run: |
          jq 'walk(if type == "object" and has("relationships") then .relationships |= map(if type == "object" then . else empty end) else . end)' security.sarif > security-fixed.sarif
          mv security-fixed.sarif security.sarif

      - name: Upload Security Analysis Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: security.sarif
          category: gosec

