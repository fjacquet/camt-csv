site_name: CAMT-CSV Documentation
site_description: Convert financial statements to CSV with intelligent transaction categorization
site_url: https://fjacquet.github.io/camt-csv/
repo_url: https://github.com/fjacquet/camt-csv
repo_name: fjacquet/camt-csv

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - User Guide: user-guide.md
  - Development:
      - Developer Guide: developer-guide.md
      - Architecture: architecture.md
      - Design Principles: design-principles.md
      - Coding Standards: coding-standards.md
      - API Specifications: api-specifications.md
      - Testing Strategy: testing-strategy.md
      - Operations: operations.md
  - Parsers:
      - Revolut Investment: revolut-investment-parser.md
      - Codebase Overview: codebase_documentation.md
  - Architecture Decision Records:
      - ADR-001 Parser Interface: adr/ADR-001-parser-interface-standardization.md
      - ADR-002 Hybrid Categorization: adr/ADR-002-hybrid-categorization-approach.md
      - ADR-003 Functional Programming: adr/ADR-003-functional-programming-adoption.md
      - ADR-004 Configuration Management: adr/ADR-004-configuration-management-strategy.md
      - ADR-005 Revolut Investment Parser: adr/ADR-005-revolut-investment-parser.md
      - ADR-006 HTTP API Gemini: adr/ADR-006-http-api-gemini-integration.md
      - ADR-007 Logging Abstraction: adr/ADR-007-logging-abstraction-layer.md
      - ADR-008 Logging Implementation: adr/ADR-008-logging-abstraction-implementation.md
      - ADR-009 Semantic Routing: adr/ADR-009-semantic-routing.md
