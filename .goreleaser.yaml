version: 2

project_name: camt-csv

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: camt-csv
    main: ./
    binary: camt-csv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: camt-csv
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat.*:.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*:.*$"
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "Merge pull request"
      - "Merge remote-tracking branch"

release:
  github:
    owner: fjacquet
    name: camt-csv
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  make_latest: true
