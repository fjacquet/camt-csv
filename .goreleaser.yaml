version: 2

project_name: camt-csv

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: camt-csv
    main: ./
    binary: camt-csv
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: camt-csv
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/fjacquet/camt-csv:{{ .Version }}-amd64"
      - "ghcr.io/fjacquet/camt-csv:latest-amd64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/fjacquet/camt-csv"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .CommitDate }}"
    extra_files:
      - database

  - id: arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/fjacquet/camt-csv:{{ .Version }}-arm64"
      - "ghcr.io/fjacquet/camt-csv:latest-arm64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/fjacquet/camt-csv"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .CommitDate }}"
    extra_files:
      - database

docker_manifests:
  - name_template: "ghcr.io/fjacquet/camt-csv:{{ .Version }}"
    image_templates:
      - "ghcr.io/fjacquet/camt-csv:{{ .Version }}-amd64"
      - "ghcr.io/fjacquet/camt-csv:{{ .Version }}-arm64"
  - name_template: "ghcr.io/fjacquet/camt-csv:latest"
    image_templates:
      - "ghcr.io/fjacquet/camt-csv:latest-amd64"
      - "ghcr.io/fjacquet/camt-csv:latest-arm64"

brews:
  - repository:
      owner: fjacquet
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/fjacquet/camt-csv"
    description: "Convert financial statements (CAMT.053 XML, PDF, Revolut CSV, Selma CSV) to standardized CSV with AI-powered categorization"
    license: "MIT"
    install: |
      bin.install "camt-csv"
    test: |
      system "#{bin}/camt-csv", "--version"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat.*:.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*:.*$"
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "Merge pull request"
      - "Merge remote-tracking branch"

release:
  github:
    owner: fjacquet
    name: camt-csv
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  make_latest: true
